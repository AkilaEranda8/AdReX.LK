# HTTP-only phase for initial SSL certificate issuance.
# After cert exists, deploy.sh switches to nginx-invoice.conf (HTTPS).

upstream invoice_app {
    server 172.18.0.1:3002;
}

server {
    listen 80;
    server_name invoice.hexalyte.com;

    location = /.well-known/acme-challenge/ {
        return 404;
    }
    location ~ ^/.well-known/acme-challenge/(.+)$ {
        alias /var/www/html/.well-known/acme-challenge/$1;
        default_type text/plain;
        access_log off;
    }

    location / {
        proxy_pass http://invoice_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
