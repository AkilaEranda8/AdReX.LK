# Nginx snippet for invoice.hexalyte.com
# Added to the existing IMS nginx container — does not replace ceylonalpha.com config.

upstream invoice_app {
    server 172.18.0.1:3002;
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name invoice.hexalyte.com;

    ssl_certificate     /etc/letsencrypt/live/invoice.hexalyte.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/invoice.hexalyte.com/privkey.pem;
    include /etc/nginx/conf.d/options-ssl-nginx.conf;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25m;

    location / {
        limit_req zone=general burst=50 nodelay;
        proxy_pass http://invoice_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering on;
    }
}

# HTTP — ACME + redirect
server {
    listen 80;
    server_name invoice.hexalyte.com;

    location = /.well-known/acme-challenge/ {
        return 404;
    }
    location ~ ^/.well-known/acme-challenge/(.+)$ {
        alias /var/www/html/.well-known/acme-challenge/$1;
        default_type text/plain;
        access_log off;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}
