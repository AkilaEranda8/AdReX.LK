services:
  invoice-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adrex-invoice-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/data/prod.db?busy_timeout=10000&journal_mode=WAL
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://invoice.hexalyte.com}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      RUN_DB_SEED: ${RUN_DB_SEED:-false}
    volumes:
      - invoice_data:/app/data
      - invoice_uploads:/app/uploads
    networks:
      - invoice-net
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: adrex-invoice-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx-standalone.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - invoice-app
    networks:
      - invoice-net

volumes:
  invoice_data:
  invoice_uploads:

networks:
  invoice-net:
    driver: bridge
