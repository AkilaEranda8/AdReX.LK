services:
  invoice-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adrex-invoice-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/data/prod.db
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_APP_URL: https://invoice.hexalyte.com
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      RUN_DB_SEED: ${RUN_DB_SEED:-false}
    volumes:
      - invoice_data:/app/data
      - invoice_uploads:/app/uploads
    networks:
      - default
      - ims-network

volumes:
  invoice_data:
  invoice_uploads:

networks:
  ims-network:
    external: true
    name: hexalyte-main-ims_mynetwork-ims
